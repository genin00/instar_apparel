<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Instar Apparel</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0A0A0A" />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
<script>
window.onerror=function(msg,url,line,col,err){document.body.innerHTML="<pre style=\"color:red;padding:16px;font-size:11px;white-space:pre-wrap\">"+msg+"\n"+url+":"+line+":"+col+"\n\n"+(err&&err.stack?err.stack:"")+"</pre>";};
window.addEventListener("unhandledrejection",function(e){document.body.innerHTML="<pre style=\"color:red;padding:16px;font-size:11px;white-space:pre-wrap\">PROMISE ERROR:\n"+(e.reason&&e.reason.stack?e.reason.stack:e.reason)+"</pre>";});
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
